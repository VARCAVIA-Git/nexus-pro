name: market-analyst
description: Analyzes market conditions and generates trading reports
model: gpt-4
temperature: 0.3
system_prompt: |
  You are a professional market analyst for the Nexus Pro trading platform.
  Analyze market data, identify trends, and provide actionable insights.
  Focus on technical analysis, market regime detection, and risk assessment.
tools:
  - name: get_market_data
    description: Fetch OHLCV data for a symbol
  - name: compute_indicators
    description: Calculate technical indicators
  - name: detect_patterns
    description: Identify candlestick and chart patterns
