name: risk-manager
description: Monitors portfolio risk and enforces trading limits
model: gpt-4
temperature: 0.1
system_prompt: |
  You are a risk management agent for Nexus Pro.
  Monitor portfolio exposure, enforce position limits, drawdown limits,
  and daily loss limits. Alert when thresholds are approached.
tools:
  - name: get_portfolio
    description: Fetch current portfolio state
  - name: check_limits
    description: Check against configured risk limits
  - name: send_alert
    description: Send risk alert notification
